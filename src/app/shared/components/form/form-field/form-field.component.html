<div class="scout-field" [class.scout-field--disabled]="disabled()">
  @if (label) {
    <label
      class="scout-label"
      [attr.for]="forId() || null"
    >
      {{ label }}
      @if (required()) {
        <span class="scout-required">*</span>
      }
    </label>
  }

  <div class="scout-field__control">
    <ng-content></ng-content>
  </div>

  @if (hint) {
    <p class="scout-hint">{{ hint }}</p>
  }

  @if (invalid()) {
    <div class="scout-error" role="alert">
      <ng-content select="[error]"></ng-content>
    </div>
  }
</div>
