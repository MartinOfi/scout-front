<div class="scout-form-actions" [class.scout-form-actions--dense]="dense()">
  <div
    class="scout-form-actions__row"
    [class.scout-form-actions__row--end]="align() === 'end'"
    [class.scout-form-actions__row--start]="align() === 'start'"
    [class.scout-form-actions__row--between]="align() === 'between'"
  >
    <ng-content></ng-content>
  </div>
  <ng-content select="[actions-extra]"></ng-content>
</div>
