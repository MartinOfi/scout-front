<input
  [id]="id() || null"
  type="number"
  [attr.min]="min() ?? null"
  [attr.max]="max() ?? null"
  [step]="step()"
  [placeholder]="placeholder()"
  [disabled]="disabled"
  [value]="value ?? ''"
  (input)="handleInput($any($event.target).value)"
  (blur)="handleBlur()"
  class="scout-input--number unstyled"
/>
