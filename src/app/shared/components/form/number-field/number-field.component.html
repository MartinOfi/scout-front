<input
  [id]="id() || null"
  type="number"
  [attr.min]="min() ?? null"
  [attr.max]="max() ?? null"
  [step]="step()"
  [placeholder]="placeholder()"
  [disabled]="disabled"
  [value]="value ?? ''"
  (input)="handleInput($any($event.target).value)"
  (blur)="handleBlur()"
  class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
/>
