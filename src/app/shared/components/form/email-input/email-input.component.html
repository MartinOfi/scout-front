<div class="scout-field" [class.scout-field--focused]="focused()" [class.scout-field--error]="hasError" [class.scout-field--disabled]="disabled()">
  <label class="scout-label" for="email-input">
    {{ label() }}
    @if (required()) {
      <span class="scout-required">*</span>
    }
  </label>
  <div class="scout-input-wrapper">
    @if (icon()) {
      <mat-icon class="scout-input-icon" [class.scout-input-icon--focused]="focused()">{{ icon() }}</mat-icon>
    }
    <input
      id="email-input"
      type="email"
      [placeholder]="placeholder()"
      [required]="required()"
      [disabled]="disabled()"
      autocomplete="email"
      [value]="value()"
      (input)="onInput($event)"
      (focus)="onFocus()"
      (blur)="onBlur()"
      class="scout-input"
      [class.scout-input--with-icon]="icon()"
      [class.scout-input--error]="hasError"
    />
  </div>
  @if (currentError) {
    <span class="scout-error">{{ currentError }}</span>
  }
</div>
