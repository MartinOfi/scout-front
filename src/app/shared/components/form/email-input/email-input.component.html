<div class="scout-field">
  <label class="scout-label" [for]="'email-input'">
    {{ label() }}
    @if (required()) {
      <span class="scout-required">*</span>
    }
  </label>
  <input
    [id]="'email-input'"
    type="email"
    [placeholder]="placeholder()"
    [required]="required()"
    [disabled]="disabled"
    autocomplete="email"
    [value]="value"
    (input)="onInput($event)"
    (blur)="onBlur()"
    class="scout-input"
  />
</div>
