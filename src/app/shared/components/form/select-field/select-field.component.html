<!--
  Select Field Component Template

  IMPORTANTE: Si usas optionLabelFn, SIEMPRE proporciona también optionValueFn
  para evitar problemas de sincronización de valores en formularios de edición.

  Ver documentación completa en select-field.component.ts
-->

@if (searchable()) {
  <input
    type="text"
    class="scout-input scout-input--search"
    [value]="searchText"
    (input)="handleSearch($any($event.target).value)"
    [placeholder]="'Buscar...'"
    [disabled]="disabled"
  />
}

<div class="scout-select-wrapper">
  <select
    #selectElement
    [id]="id() || null"
    [disabled]="disabled"
    class="scout-select"
    [value]="$any(value)"
    (change)="handleChange($any($event.target).value)"
    (blur)="handleBlur()"
  >
    @if (placeholder) {
      <option value="">{{ placeholder }}</option>
    }
    @if (loading()) {
      <option disabled>Cargando...</option>
    } @else if (getDisplayOptions().length === 0) {
      <option disabled>
        {{
          searchable() && searchText.length >= minSearchLength()
            ? emptySearchText()
            : emptyText()
        }}
      </option>
    } @else {
      @for (opt of getDisplayOptions(); track getOptionValue(opt)) {
        <option [value]="$any(getOptionValue(opt))">
          {{ getOptionLabel(opt) }}
        </option>
      }
    }

    <ng-content></ng-content>
  </select>
  <div class="scout-select-icon">
    <svg width="12" height="8" viewBox="0 0 12 8" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M1 1.5L6 6.5L11 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
</div>
