<!--
  Select Field Component Template
  
  IMPORTANTE: Si usas optionLabelFn, SIEMPRE proporciona también optionValueFn
  para evitar problemas de sincronización de valores en formularios de edición.
  
  Ver documentación completa en select-field.component.ts
-->

@if (searchable()) {
<input type="text"
  class="mb-2 w-full px-3 py-2 border border-gray-200 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-300 focus:border-transparent"
  [value]="searchText" (input)="handleSearch($any($event.target).value)" [placeholder]="'Buscar...'"
  [disabled]="disabled" />
}

<select #selectElement [id]="id() || null" [disabled]="disabled"
  class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
  [value]="$any(value)" (change)="handleChange($any($event.target).value)" (blur)="handleBlur()">
  @if (placeholder) {
  <option value="">{{ placeholder }}</option>
  } @if (loading()) {
  <option disabled>Cargando...</option>
  } @else if (getDisplayOptions().length === 0) {
  <option disabled>
    {{
    searchable() && searchText.length >= minSearchLength()
    ? emptySearchText()
    : emptyText()
    }}
  </option>
  } @else { @for (opt of getDisplayOptions(); track getOptionValue(opt)) {
  <option [value]="$any(getOptionValue(opt))">
    {{ getOptionLabel(opt) }}
  </option>
  } }

  <ng-content></ng-content>
</select>
