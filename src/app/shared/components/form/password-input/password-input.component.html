<div class="scout-field" [class.scout-field--focused]="focused()" [class.scout-field--error]="hasError"
  [class.scout-field--disabled]="disabled()">
  <label class="scout-label" for="password-input">
    {{ label() }}
    @if (required()) {
    <span class="scout-required">*</span>
    }
  </label>
  <div class="scout-input-wrapper">
    @if (icon()) {
    <mat-icon class="scout-input-icon" [class.scout-input-icon--focused]="focused()">{{ icon() }}</mat-icon>
    }
    <input id="password-input" [type]="inputType" [placeholder]="placeholder()" [required]="required()"
      [disabled]="disabled()" autocomplete="current-password" [value]="value()" (input)="onInput($event)"
      (focus)="onFocus()" (blur)="onBlur()" class="scout-input" [class.scout-input--with-icon]="icon()"
      [class.scout-input--with-suffix]="showToggle()" [class.scout-input--error]="hasError" />
    @if (showToggle()) {
    <button type="button" class="scout-input-toggle unstyled" (click)="toggleVisibility()"
      [attr.aria-label]="visibilityLabel" tabindex="-1">
      <mat-icon>{{ visibilityIcon }}</mat-icon>
    </button>
    }
  </div>
  @if (currentError) {
  <span class="scout-error">{{ currentError }}</span>
  }
</div>
