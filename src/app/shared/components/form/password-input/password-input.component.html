<div class="scout-field">
  <label class="scout-label" [for]="'password-input'">
    {{ label() }}
    @if (required()) {
      <span class="scout-required">*</span>
    }
  </label>
  <input
    [id]="'password-input'"
    type="password"
    [placeholder]="placeholder()"
    [required]="required()"
    [disabled]="disabled"
    autocomplete="current-password"
    [value]="value"
    (input)="onInput($event)"
    (blur)="onBlur()"
    class="scout-input"
  />
</div>
