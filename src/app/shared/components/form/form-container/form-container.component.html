<div class="scout-form-page">
  <div
    class="scout-form-wrapper"
    [class.scout-form-wrapper--single]="columns() === 1"
    [class.scout-form-wrapper--double]="columns() === 2"
  >
    <div class="scout-form-card">
      <header
        class="scout-form-header"
        [class.scout-form-header--with-divider]="divider()"
      >
        @if (title) {
          <h1 class="scout-form-title">
            @if (icon) {
              <i class="{{ icon }} scout-form-icon"></i>
            }
            {{ title }}
          </h1>
        }
        @if (subtitle) {
          <p class="scout-form-subtitle">{{ subtitle }}</p>
        }
        <ng-content select="[form-header]"></ng-content>
      </header>

      <div
        class="scout-form-body"
        [class.scout-form-body--comfortable]="density() === 'comfortable'"
        [class.scout-form-body--compact]="density() === 'compact'"
      >
        <ng-content></ng-content>
      </div>

      <ng-content select="[form-actions]"></ng-content>
    </div>
  </div>
</div>
