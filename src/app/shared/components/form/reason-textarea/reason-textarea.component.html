<div class="scout-field" [ngClass]="customClass()">
  <label class="scout-label" [for]="'textarea-' + label()">
    {{ label() }}
  </label>
  <textarea
    [id]="'textarea-' + label()"
    [formControl]="control()"
    [placeholder]="placeholder()"
    class="scout-textarea"
    rows="4"
  ></textarea>
</div>
