<input [id]="id() || null" [type]="type()" [placeholder]="placeholder()" [disabled]="disabled" [value]="value"
  (input)="handleInput($any($event.target).value)" (blur)="handleBlur()"
  class="unstyled w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
