<article class="stat-card" [class]="'stat-card--' + variant()">
  <header class="stat-card__header">
    <span class="stat-card__icon" [class]="'stat-card__icon--' + variant()">
      <mat-icon>{{ icon() }}</mat-icon>
    </span>
    <span class="stat-card__title">{{ title() }}</span>
  </header>
  <p class="stat-card__value">
    @switch (format()) {
      @case ('currency') {
        {{ value() | currency:'$':'symbol':'1.0-0':'es-AR' }}
      }
      @case ('percent') {
        {{ value() | percent:'1.0-1' }}
      }
      @default {
        {{ value() | number:'1.0-0' }}
      }
    }
  </p>
</article>
