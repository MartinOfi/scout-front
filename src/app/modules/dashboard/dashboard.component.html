<section class="dashboard-stats">
  @for (stat of stats; track stat.title) {
  <app-stat-card [icon]="stat.icon" [title]="stat.title" [value]="stat.value" [variant]="stat.variant" />
  }
</section>

<section class="dashboard-cards">
  <app-data-list-card title="Acciones Rápidas">
    <div class="actions-grid">
      @for (action of quickActions; track action.route) {
      <app-action-button
        [icon]="action.icon"
        [label]="action.label"
        [variant]="action.variant"
        (clicked)="onQuickAction(action.route)"
      />
      }
    </div>
  </app-data-list-card>

  <app-data-list-card title="Próximos Eventos" linkText="Ver todos" (linkClicked)="onVerTodosEventos()">
    @for (evento of proximosEventos; track evento.id) {
    <app-event-list-item
      [fecha]="evento.fecha"
      [titulo]="evento.titulo"
      [categoria]="evento.categoria"
      (clicked)="onEventoClick(evento.id)"
    />
    }
  </app-data-list-card>
</section>

<section class="dashboard-lists">
  <app-data-list-card title="Movimientos Recientes" linkText="Ver más" (linkClicked)="onVerMasMovimientos()">
    @for (mov of movimientosRecientes; track mov.concepto) {
    <app-data-list-item [icon]="mov.icon" [iconVariant]="mov.iconVariant" [primaryText]="mov.concepto"
      [secondaryText]="mov.detalle" [value]="mov.monto" valueVariant="auto" />
    }
  </app-data-list-card>

  <app-data-list-card title="Fondos por Rama">
    @for (fondo of fondosRama; track fondo.nombre) {
    <app-data-list-item [icon]="fondo.icon" [iconVariant]="fondo.iconVariant" [primaryText]="fondo.nombre"
      [secondaryText]="fondo.protagonistas + ' protagonistas'" [value]="fondo.saldo" valueVariant="neutral" />
    }
  </app-data-list-card>
</section>
