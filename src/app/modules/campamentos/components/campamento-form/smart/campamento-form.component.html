<div class="scout-form-page">
  <div class="scout-form-wrapper scout-form-wrapper--single">
    <div class="scout-form-card">
      <!-- Header -->
      <header class="scout-form-header scout-form-header--with-divider">
        <h1 class="scout-form-title">
          <i class="fas fa-campground scout-form-icon"></i>
          {{ isEditing() ? 'Editar Campamento' : 'Nuevo Campamento' }}
        </h1>
        <p class="scout-form-subtitle">
          {{ isEditing() ? 'Modifica los datos del campamento' : 'Registra un nuevo campamento' }}
        </p>
      </header>

      <!-- Content -->
      <div class="scout-form-body">
        @if (loading()) {
          <div class="loading-state">
            <div class="loading-spinner"></div>
            <p class="loading-text">Cargando...</p>
          </div>
        } @else {
          <form [formGroup]="form" (ngSubmit)="onSubmit()">
            <!-- Nombre -->
            <app-form-field
              label="Nombre del Campamento"
              [forId]="'nombre-input'"
              [required]="true"
              [invalid]="!!(form.get('nombre')?.invalid && form.get('nombre')?.touched)"
            >
              <app-text-field
                id="nombre-input"
                formControlName="nombre"
                placeholder="Ej: Campamento de Verano 2024"
              />
              <span error>El nombre es requerido</span>
            </app-form-field>

            <div class="form-row">
              <!-- Fecha de Inicio - mantiene mat-datepicker -->
              <mat-form-field>
                <mat-label>Fecha de Inicio</mat-label>
                <input matInput [matDatepicker]="pickerInicio" formControlName="fechaInicio">
                <mat-datepicker-toggle matIconSuffix [for]="pickerInicio"></mat-datepicker-toggle>
                <mat-datepicker #pickerInicio></mat-datepicker>
              </mat-form-field>

              <!-- Fecha de Fin - mantiene mat-datepicker -->
              <mat-form-field>
                <mat-label>Fecha de Fin</mat-label>
                <input matInput [matDatepicker]="pickerFin" formControlName="fechaFin">
                <mat-datepicker-toggle matIconSuffix [for]="pickerFin"></mat-datepicker-toggle>
                <mat-datepicker #pickerFin></mat-datepicker>
              </mat-form-field>
            </div>

            <!-- Costo por Persona -->
            <app-form-field
              label="Costo por Persona"
              [forId]="'costo-input'"
              [required]="true"
              [invalid]="!!(form.get('costoPorPersona')?.invalid && form.get('costoPorPersona')?.touched)"
            >
              <div class="input-with-prefix">
                <span class="input-prefix">$</span>
                <app-number-field
                  id="costo-input"
                  formControlName="costoPorPersona"
                  [min]="0"
                  [step]="0.01"
                  placeholder="0.00"
                />
              </div>
              <span error>El costo es requerido</span>
            </app-form-field>

            <!-- Descripción -->
            <app-form-field
              label="Descripción"
              [forId]="'descripcion-input'"
            >
              <app-textarea-field
                id="descripcion-input"
                formControlName="descripcion"
                [rows]="4"
                placeholder="Descripción del campamento"
              />
            </app-form-field>
          </form>
        }
      </div>

      <!-- Actions -->
      @if (!loading()) {
        <div class="scout-form-actions">
          <div class="scout-form-actions__row scout-form-actions__row--between">
            <button type="button" class="btn-secondary" (click)="onCancel()">
              Cancelar
            </button>
            <button
              type="submit"
              class="btn-primary"
              [disabled]="form.invalid"
              (click)="onSubmit()"
            >
              {{ isEditing() ? 'Actualizar' : 'Crear' }}
            </button>
          </div>
        </div>
      }
    </div>
  </div>
</div>
