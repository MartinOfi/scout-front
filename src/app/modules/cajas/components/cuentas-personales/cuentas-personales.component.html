<div class="cuentas-personales-container">
  <div class="header">
    <h2>Cuentas Personales</h2>
    <p class="subtitle">Cuentas corrientes de educadores y protagonistas</p>
  </div>

  @if (loading()) {
    <div class="loading-state">
      <mat-spinner diameter="40"></mat-spinner>
      <span>Cargando cuentas...</span>
    </div>
  } @else if (tableData().length === 0) {
    <div class="empty-state">
      <mat-icon>person_off</mat-icon>
      <span>No hay personas con cuentas personales</span>
    </div>
  } @else {
    <app-data-table
      [data]="tableData()"
      [columns]="tableColumns"
      [config]="{ showHeader: true, hoverable: true }"
      (actionClick)="onActionClick($event)"
      (rowClick)="onRowClick($event)" />
  }
</div>
