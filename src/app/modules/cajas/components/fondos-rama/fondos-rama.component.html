<div class="fondos-rama-container">
  <section class="fondos-stats">
    <app-stat-card
      icon="savings"
      title="Total Fondos de Rama"
      [value]="totalSaldosRamas()"
      [variant]="totalSaldosRamas() >= 0 ? 'success' : 'danger'"
    />
  </section>

  <div class="header">
    <h2>Fondos por Rama</h2>
  </div>

  @if (loading()) {
    <div class="loading-state">
      <mat-spinner diameter="40"></mat-spinner>
      <span>Cargando fondos...</span>
    </div>
  }

  <div class="fondos-grid">
    @for (rama of ramas; track rama) {
      <app-fondo-card
        [rama]="rama"
        [saldo]="getSaldoRama(rama)"
        [icon]="getRamaIcon(rama)"
        [label]="getRamaLabel(rama)"
        (cardClick)="onOpenDrawer(rama)"
        (verMovimientos)="onVerMovimientosRama(rama)"
        (registrarMovimiento)="onRegistrarMovimiento(rama)">
      </app-fondo-card>
    }
  </div>
</div>
