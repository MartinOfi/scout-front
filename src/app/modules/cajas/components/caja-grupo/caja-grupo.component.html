<div class="caja-grupo-container">
  @if (loading()) {
    <div class="loading-state">
      <mat-spinner diameter="40"></mat-spinner>
      <span>Cargando...</span>
    </div>
  }

  @if (error()) {
    <div class="error-state">
      <mat-icon color="warn">error</mat-icon>
      <span>{{ error() }}</span>
    </div>
  }

  @if (cajaGrupo(); as caja) {
    <!-- KPI Section - Consistent with inscripciones/personas -->
    <section class="caja-stats">
      <app-stat-card
        icon="account_balance"
        title="Saldo Caja de Grupo"
        [value]="saldoGrupo()"
        [variant]="saldoGrupo() >= 0 ? 'success' : 'danger'"
      />
    </section>

    <!-- Action Buttons Grid -->
    <div class="action-grid">
      <app-action-button
        icon="add"
        label="Registrar Movimiento"
        variant="success"
        (clicked)="onRegistrarMovimiento()"
      />
      <app-action-button
        icon="info"
        label="Ver Detalles"
        variant="info"
        (clicked)="onOpenDrawer()"
      />
      <app-action-button
        icon="list_alt"
        label="Ver Todos los Movimientos"
        variant="warning"
        (clicked)="onVerTodosMovimientos()"
      />
    </div>

    <!-- Movimientos Section with DataTable -->
    <section class="movimientos-section">
      <h3 class="section-title">Últimos Movimientos</h3>
      <app-data-table
        [data]="$any(movimientosGrupo() | slice:0:10)"
        [columns]="movimientosColumns"
        [config]="{ hidePagination: true }"
        (actionClick)="onTableAction($event)"
      />
    </section>
  }
</div>
