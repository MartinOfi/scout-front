<table mat-table [dataSource]="movimientos()" class="movimientos-table">
  
  <ng-container matColumnDef="fecha">
    <th mat-header-cell *matHeaderCellDef>Fecha</th>
    <td mat-cell *matCellDef="let mov">
      {{ mov.fecha | date:'dd/MM/yyyy' }}
    </td>
  </ng-container>

  <ng-container matColumnDef="concepto">
    <th mat-header-cell *matHeaderCellDef>Concepto</th>
    <td mat-cell *matCellDef="let mov">
      {{ getConceptoLabel(mov.concepto) }}
    </td>
  </ng-container>

  <ng-container matColumnDef="tipo">
    <th mat-header-cell *matHeaderCellDef>Tipo</th>
    <td mat-cell *matCellDef="let mov">
      <mat-chip [color]="mov.tipo === tipoEnum.INGRESO ? 'primary' : 'warn'" selected>
        {{ mov.tipo === tipoEnum.INGRESO ? 'Ingreso' : 'Egreso' }}
      </mat-chip>
    </td>
  </ng-container>

  <ng-container matColumnDef="monto">
    <th mat-header-cell *matHeaderCellDef>Monto</th>
    <td mat-cell *matCellDef="let mov" [class.ingreso]="mov.tipo === tipoEnum.INGRESO">
      {{ mov.monto | currency:'ARS':'symbol':'1.2-2' }}
    </td>
  </ng-container>

  <ng-container matColumnDef="acciones">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let mov">
      <button mat-icon-button (click)="verDetalle.emit(mov.id)">
        <mat-icon>visibility</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>

@if (movimientos().length === 0) {
  <div class="empty-state">
    <mat-icon>receipt_long</mat-icon>
    <span>No hay movimientos registrados</span>
  </div>
}
