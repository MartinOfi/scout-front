<app-form-field
  label="Concepto"
  [forId]="'concepto-select'"
  [required]="true"
>
  <select
    id="concepto-select"
    class="scout-select"
    [value]="selected()"
    (change)="onSelectChange($event)"
  >
    <option value="">Seleccionar concepto</option>
    @for (concepto of conceptosFiltrados(); track concepto) {
      <option [value]="concepto">{{ conceptoLabels[concepto] }}</option>
    }
  </select>
</app-form-field>
