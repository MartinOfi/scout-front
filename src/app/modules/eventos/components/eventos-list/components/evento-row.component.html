<mat-card class="evento-row" (click)="select.emit(evento().id)">
  <mat-card-header>
    <mat-card-title>{{ evento().nombre }}</mat-card-title>
    <mat-card-subtitle>
      {{ evento().fecha | date:'dd/MM/yyyy' }}
    </mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <mat-chip-listbox>
      <mat-chip [color]="evento().tipo === 'venta' ? 'primary' : 'accent'">
        {{ tipoLabels[evento().tipo] }}
      </mat-chip>
    </mat-chip-listbox>
    @if (evento().descripcion) {
      <p class="descripcion">{{ evento().descripcion }}</p>
    }
  </mat-card-content>
  <mat-card-actions>
    <button mat-icon-button (click)="edit.emit(evento().id); $event.stopPropagation()">
      <mat-icon>edit</mat-icon>
    </button>
  </mat-card-actions>
</mat-card>
