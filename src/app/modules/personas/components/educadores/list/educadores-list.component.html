<div class="educadores-list-container">
  <header class="page-header">
    <h1>Educadores</h1>
    <button mat-raised-button color="primary" (click)="onCreate()">
      <mat-icon>add</mat-icon>
      Nuevo Educador
    </button>
  </header>

  <app-educadores-filters (filterChange)="onFilterChange($event)" />

  @if (loading()) {
    <app-loading-spinner message="Cargando educadores..." />
  } @else if (error()) {
    <app-empty-state
      icon="error_outline"
      [message]="error() ?? 'Error al cargar educadores'"
      actionLabel="Reintentar"
      (onAction)="state.load()" />
  } @else if (educadores().length === 0) {
    <app-empty-state
      icon="school"
      message="No hay educadores. ¡Crea uno ahora!"
      actionLabel="Nuevo Educador"
      (onAction)="onCreate()" />
  } @else {
    <app-educadores-table
      [data]="educadores()"
      (select)="onSelect($event)"
      (edit)="onEdit($event)"
      (delete)="onDelete($event)" />
  }
</div>
