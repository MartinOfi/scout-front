<mat-card class="empty-state-card">

    <h2>No hay educadores</h2>
    <p>Comienza agregando el primer educador al sistema</p>
    <button mat-raised-button color="primary" (click)="create.emit()">
      <mat-icon>add</mat-icon>
      Agregar Educador
    </button>
  </mat-card-content>
</mat-card>
