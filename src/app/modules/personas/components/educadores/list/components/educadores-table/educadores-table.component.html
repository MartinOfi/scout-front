<table mat-table [dataSource]="data()" class="educadores-table">
  <ng-container matColumnDef="nombre">
    <th mat-header-cell *matHeaderCellDef>Nombre</th>
    <td mat-cell *matCellDef="let row" (click)="select.emit(row.id)">{{ row.nombre }}</td>
  </ng-container>

  <ng-container matColumnDef="rama">
    <th mat-header-cell *matHeaderCellDef>Rama</th>
    <td mat-cell *matCellDef="let row"><mat-chip>{{ row.rama }}</mat-chip></td>
  </ng-container>

  <ng-container matColumnDef="cargo">
    <th mat-header-cell *matHeaderCellDef>Cargo</th>
    <td mat-cell *matCellDef="let row">{{ row.cargo || '-' }}</td>
  </ng-container>

  <ng-container matColumnDef="estado">
    <th mat-header-cell *matHeaderCellDef>Estado</th>
    <td mat-cell *matCellDef="let row">
      <mat-chip [color]="row.estado === 'activo' ? 'primary' : 'warn'">{{ row.estado }}</mat-chip>
    </td>
  </ng-container>

  <ng-container matColumnDef="acciones">
    <th mat-header-cell *matHeaderCellDef>Acciones</th>
    <td mat-cell *matCellDef="let row">
      <button mat-icon-button (click)="edit.emit(row.id); $event.stopPropagation()">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button color="warn" (click)="delete.emit(row.id); $event.stopPropagation()">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;" (click)="select.emit(row.id)"></tr>
</table>
