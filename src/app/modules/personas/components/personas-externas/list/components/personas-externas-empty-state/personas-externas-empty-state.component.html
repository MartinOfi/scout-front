<mat-card class="empty-state-card">
  <mat-card-content>
    <mat-icon class="empty-icon">person_outline</mat-icon>
    <h2>No hay personas externas</h2>
    <p>Comienza agregando la primera persona externa al sistema</p>
    <button mat-raised-button color="primary" (click)="create.emit()">
      <mat-icon>add</mat-icon>
      Agregar Persona Externa
    </button>
  </mat-card-content>
</mat-card>
